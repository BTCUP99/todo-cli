name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Release Package
        run: |
          mkdir -p dist
          VERSION=${GITHUB_REF#refs/tags/v}
          # 创建 tar.gz 包
          tar -czvf dist/todo-cli-${VERSION}.tar.gz todo.py requirements.txt README.md
          # 创建 zip 包
          zip -j dist/todo-cli-${VERSION}.zip todo.py requirements.txt README.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
