name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Release Package
        run: |
          mkdir -p dist
          # 打包 Python 源码
          tar -czvf dist/todo-cli-v${GITHUB_REF#refs/tags/v}.tar.gz todo.py requirements.txt README.md

      - name: Create zip package
        run: |
          cd dist
          unzip -o ../todo.py ../requirements.txt ../README.md 2>/dev/null || true
          zip -r todo-cli-v${GITHUB_REF#refs/tags/v}.zip todo.py requirements.txt README.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
